<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>チケット情報</title>
</head>
<body>

<div layout:fragment="content" class="pt-7 pb-7">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">

        <!-- チケットがない場合の表示 -->
        <div th:if="${noActiveEntry}" class="bg-white rounded-3xl shadow-xl overflow-hidden mt-5 py-12 text-center">
            <div th:unless="${noActiveEntry}" class="mb-6">
                <svg class="mx-auto h-16 w-16 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <h1 class="text-1xl md:text-2xl font-bold text-gray-700 mb-4">現在、応募中のイベントはありません</h1>
            <p class="text-gray-500 mb-8">イベントを探して応募してみましょう！</p>
            <a th:href="@{/}"
               class="inline-block bg-blue-500 text-white px-8 py-3 rounded-full hover:bg-blue-600 transition duration-300 font-bold text-lg shadow-lg">
                イベント一覧へ
            </a>
        </div>

        <!-- チケットがある場合の表示 -->
        <div th:unless="${noActiveEntry}" class="bg-white rounded-3xl shadow-xl overflow-hidden p-8">

            <div class="text-center mb-8">
                <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-700 leading-tight tracking-tight">
                    チケット情報
                </h1>
            </div>

            <div class="space-y-6">
                <div class="mx-auto w-fit text-left space-y-6">
                    <div>
                        <p class="text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">お名前</p>
                        <p class="text-xl font-bold text-gray-700"><span th:text="${userName}">山田 太郎</span>　様</p>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">応募中イベント</p>
                        <p class="text-xl font-bold text-gray-700" th:text="${eventName}">イベント名</p>
                    </div>
                </div>

                        <!-- 基本情報 (常に横並びの2カラム) -->
                <div class="grid grid-cols-2 mb-10 border-y border-gray-200/50 py-8 divide-x divide-gray-200/50">
                    <div class="text-center px-2">
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">現在の待ち組数</p>
                        <p class="text-3xl sm:text-4xl font-black text-blue-600">
                            <span th:text="${queueNumber}">0</span><span class="text-lg ml-1 text-gray-600">組</span>
                        </p>
                    </div>
                    <div class="text-center px-2">
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">現在の待ち時間</p>
                        <p class="text-3xl sm:text-4xl font-black text-blue-600">
                            <span class="text-lg mr-1 text-gray-600">約</span><span th:text="${waitTime}">0</span><span class="text-lg ml-1 text-gray-600">分</span>
                        </p>
                    </div>
                </div>
            </div>

            <div class="mt-8 text-center font-bold text-gray-700">お時間になりましたら<br class="block md:hidden">受付までお越しください</div>

            <div class="mt-8 flex flex-col items-center gap-4">
                <form th:action="@{/entries/{id}/arrive(id=${entryId})}" method="post">
                    <button type="submit"
                            class="w-full bg-green-500 text-white px-8 py-4 rounded-full hover:bg-green-600 transition duration-300 font-bold text-lg">
                        受付完了
                    </button>
                </form>

                <form th:action="@{/entries/{id}/cancel(id=${entryId})}" method="post"
                      onsubmit="return confirm('本当にキャンセルしますか？');">
                    <button type="submit"
                            class="text-gray-400 hover:text-gray-700 font-medium transition duration-300 border-b border-transparent hover:border-gray-800 pb-0.5">
                        キャンセルする
                    </button>
                </form>
            </div>
        </div>

        <!--------------- 応募完了モーダル ----------------->
        <div id="completion-modal"
             class="fixed inset-0 z-[100] flex items-start md:items-center justify-center hidden opacity-0 transition-all duration-300 pt-20 md:pt-0">
            <!-- 背景オーバーレイ -->
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>

            <!-- モーダルコンテンツ -->
            <div id="modal-content" class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full mx-4 relative scale-95 transition-all duration-300 border border-white/20">
                <div class="text-center">
                    <!-- チェックマークアイコン -->
                    <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-100 mb-6 shadow-inner">
                        <svg class="h-12 w-12 text-green-600" fill="none" stroke="currentColor"
                             viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                  d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>

                    <h3 class="text-2xl font-black text-gray-700 mb-4">応募が完了しました！</h3>
                    <p class="text-gray-500 mb-8 font-medium">受付でチケットページを<br>係員へご提示ください。
                    </p>

                    <div class="flex flex-col gap-4">
                        <button onclick="closeModal()"
                                class="w-full bg-blue-600 text-white px-6 py-4 rounded-2xl font-bold hover:bg-blue-700 transition duration-200 shadow-lg transform hover:-translate-y-0.5">
                            閉じる
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function checkModal() {
            const showModal = [[${showCompletionModal}]] || false;
            if (showModal) {
                openModal();
            }
        }
        checkModal();

        function openModal() {
            const modal = document.getElementById('completion-modal');
            const modalContent = document.getElementById('modal-content');
            if (modal && modalContent) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                }, 20);
            }
        }

        function closeModal() {
            const modal = document.getElementById('completion-modal');
            const modalContent = document.getElementById('modal-content');
            if (modal && modalContent) {
                modal.classList.add('opacity-0');
                modalContent.classList.remove('scale-100');
                modalContent.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }
    </script>
</div>

</body>
</html>
