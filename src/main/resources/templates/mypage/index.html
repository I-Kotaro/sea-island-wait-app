<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>マイページ</title>
</head>

<div layout:fragment="content" class="container mx-auto p-6">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-gray-700 text-3xl font-bold mb-8">マイページ</h1>

        <!-- ユーザー情報編集 -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-gray-700 text-2xl font-semibold mb-4">ユーザー情報</h2>
            <form th:action="@{/mypage/update}" th:object="${user}" method="post" class="space-y-4">
                <div>
                    <label for="name" class="text-gray-700 block text-sm font-medium text-gray-700">ユーザー名</label>
                    <div class="text-gray-700 mt-1 flex rounded-md shadow-sm">
                        <input type="text" id="name" th:field="*{name}"
                               class="flex-1 block w-full rounded-none rounded-l-md border-gray-300 focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                        <button type="submit"
                                class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-r-md text-white bg-blue-600 hover:bg-blue-700">
                            更新
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- アカウント削除 -->
        <div class="bg-red-50 p-6 mt-12 rounded-lg shadow-md border border-red-200">
            <h2 class="text-2xl font-semibold mb-4 text-red-800">アカウントの削除</h2>
            <p class="text-red-700 mb-4">この操作は元に戻せません。すべてのアカウント情報と応募履歴が削除されます。</p>
            <form th:action="@{/mypage/delete}" method="post"
                  onsubmit="return confirm('本当にアカウントを削除しますか？');">
                <button type="submit"
                        class="bg-red-600 text-white px-6 py-2 rounded-md flex justify-center mx-auto hover:bg-red-700">
                    アカウントを削除する
                </button>
            </form>
        </div>
    </div>

</div>

</html>
