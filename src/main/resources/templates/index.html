<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>ホーム</title>
</head>
<body>
<div layout:fragment="content">

    <div class="pt-9 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <!-- th:each を使ってカードを繰り返し生成 -->
        <div th:each="event : ${events}"
             class="bg-white rounded-lg shadow-lg p-6 flex flex-col items-center text-center">
            <img class="text-gray-700 w-24 h-24 object-cover rounded-full mb-4" th:src="${event.imageUrl}"
                 alt="Lottery Item">
            <h3 class="text-gray-700 text-xl font-semibold mb-2" th:text="${event.name}">イベント</h3>

            <p class="text-gray-700 mb-2">
                待ち組数: <span th:text="${event.queueNumber}">0</span>組
            </p>
            <p class="text-gray-700 mb-4">
                待ち時間: 約<span th:text="${event.waitTime}">0</span>分
            </p>
            <a th:href="@{/events/{id}(id=${event.id})}"
               class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600 transition duration-300">
                詳細を見る
            </a>
        </div>
    </div>
</div>
</body>
</html>
