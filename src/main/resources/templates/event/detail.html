<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${event.name}">イベント詳細</title>
</head>
<body>
<div layout:fragment="content" class="py-12">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="bg-green rounded-3xl shadow-xl overflow-hidden">

            <!-- 画像エリア (中央配置、少し小さく、角丸) -->
            <div class="pt-9 pb-4 px-8 flex justify-center">
                <img class="w-full max-w-2xl h-64 sm:h-80 object-cover rounded-2xl shadow-md"
                     th:src="${event.imageUrl}" alt="Event Image">
            </div>

            <div class="px-8 pb-10 sm:px-12">

                <!-- ヘッダー情報 (タイトル、ステータス) -->
                <div class="text-center mb-8">
                    <span class="inline-block px-4 py-1.5 rounded-full text-sm font-bold uppercase tracking-wide shadow-sm mb-4"
                          th:classappend="${event.status == 'open' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}"
                          th:text="${event.status == 'open' ? '募集中' : '受付終了'}">
                        ステータス
                    </span>
                    <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-900 leading-tight tracking-tight"
                        th:text="${event.name}">
                        イベント名
                    </h1>
                </div>

                <!-- 基本情報 (グリッドで整理) -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-10 border-y border-gray-100 py-6">
                    <div class="text-center">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">開催時間</p>
                        <p class="text-lg font-semibold text-gray-800"
                           th:text="${event.startTime} + ' - ' + ${event.endTime}">10:00 - 12:00</p>
                    </div>
                    <div class="text-center border-t sm:border-t-0 sm:border-l sm:border-r border-gray-100 pt-4 sm:pt-0">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">定員</p>
                        <p class="text-lg font-semibold text-gray-800"><span th:text="${event.capacity}">20</span>名</p>
                    </div>

                </div>

                <!-- 詳細説明 -->
                <div class="text-center prose prose-lg text-gray-600 mx-auto mb-12 leading-loose">
                    <h3 class="text-xl font-bold text-gray-900 mb-4 text-center">イベント内容</h3>
                    <p class="whitespace-pre-wrap" th:text="${event.description}">
                        イベント詳細説明
                    </p>
                </div>

                <!-- アクションボタン (中央配置) -->
                <div class="flex flex-col items-center gap-4">
                    <!-- 応募ボタン -->
                    <form th:if="${event.status == 'open'}" method="post" th:action="@{/entries/create}"
                          class="w-full max-w-md">
                        <input type="hidden" name="eventId" th:value="${event.id}">
                        <input type="hidden" name="userId" value="00000000-0000-0000-0000-000000000001">
                        <button type="submit"
                                class="w-full bg-blue-600 text-white px-8 py-4 rounded-full hover:bg-blue-700 hover:shadow-lg focus:ring-4 focus:ring-blue-200 transition duration-300 font-bold text-lg flex justify-center items-center group transform hover:-translate-y-0.5">
                            <span>このイベントに応募する</span>
                            <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none"
                                 stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                            </svg>
                        </button>
                    </form>

                    <button th:unless="${event.status == 'open'}" disabled
                            class="w-full max-w-md bg-gray-100 text-gray-400 border border-gray-200 px-8 py-4 rounded-full cursor-not-allowed font-bold text-lg text-center shadow-inner">
                        応募は締め切られました
                    </button>

                    <a href="/"
                       class="text-gray-500 hover:text-gray-800 font-medium transition duration-300 border-b border-transparent hover:border-gray-800 pb-0.5">
                        一覧に戻る
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
