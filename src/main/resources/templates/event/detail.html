<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title th:text="${event.name}">イベント詳細</title>
</head>
<body>

<div layout:fragment="content" class="py-12">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-green rounded-3xl shadow-xl overflow-hidden">
            <!-- 画像エリア (中央配置、少し小さく、角丸) -->
            <div class="pt-9 pb-4 px-8 flex justify-center">
                <img class="w-full max-w-2xl h-64 sm:h-80 object-cover rounded-2xl shadow-md"
                     th:src="${event.imageUrl}" alt="Event Image">
            </div>

            <div class="px-8 pb-10 sm:px-12">

                <!-- ヘッダー情報 (タイトル、ステータス) -->
                <div class="text-center mb-8">
                    <span class="inline-block px-4 py-1.5 rounded-full text-sm font-bold uppercase tracking-wide shadow-sm mb-4"
                          th:classappend="${event.status == 'open' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}"
                          th:text="${event.status == 'open' ? '開催中' : '受付終了'}"
                    >
                        ステータス
                    </span>
                    <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-700 leading-tight tracking-tight"
                        th:text="${event.name}">
                        イベント名
                    </h1>
                </div>

                <!-- 基本情報 (グリッドで整理) -->
                <div class="grid grid-cols-1 sm:grid-cols-2 mb-10 border-y border-gray-100 py-6">

                    <div class="text-center">
                        <p class="text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">現在の待ち組数</p>
                        <p class="text-4xl  font-bold text-gray-700">
                            <span th:text="${event.queueNumber}">0</span>組
                        </p>
                    </div>
                    <div class="text-center">
                        <p class="text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">現在の待ち時間</p>
                        <p class="text-4xl font-bold text-gray-700">
                            約<span th:text="${event.waitTime}">0</span>分
                        </p>
                    </div>
                </div>

                <!-- 詳細説明 -->
                <div class="text-center prose prose-lg text-gray-600 mx-auto mb-12 leading-loose">
                    <h3 class="text-xl font-bold text-gray-700 mb-4 text-center">イベント内容</h3>
                    <p class="text-gray-700 whitespace-pre-wrap" th:text="${event.description}">
                        イベント詳細説明
                    </p>
                </div>

                <!-- アクションボタン (中央配置) -->
                <div class="flex flex-col items-center gap-4">

                    <!-- 未ログインユーザー向けの表示 -->
                    <div sec:authorize="isAnonymous()" th:if="${event.status == 'open'}" class="w-full max-w-md">
                        <a th:href="@{/login}"
                           class="w-full bg-blue-600 text-white px-8 py-4 rounded-full hover:bg-blue-700 hover:shadow-lg focus:ring-4 focus:ring-blue-200 transition duration-300 font-bold text-lg flex justify-center items-center group transform hover:-translate-y-0.5">
                            <span>ログインして応募する</span>
                            <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none"
                                 stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                            </svg>
                        </a>
                    </div>

                    <!-- ログイン済みユーザー向けの表示 -->
                    <div sec:authorize="isAuthenticated()" class="w-full flex flex-col items-center gap-4">
                        <!-- 応募中(WAITING)の場合に表示されるエリア -->
                        <div th:if="${userEntry != null and userEntry.status == 'WAITING'}"
                             class="w-full max-w-md space-y-4">
                            <button type="button"
                                    disabled
                                    class="w-full bg-blue-500 text-white px-8 py-4 rounded-full font-bold text-lg cursor-not-allowed">
                                応募が完了しました
                            </button>
                        </div>

                        <!-- 他のイベントに応募中の場合に表示 -->
                        <div th:if="${userEntry == null and hasActiveEntry}"
                             class="w-full max-w-md bg-gray-300 text-gray-600 border px-8 py-4 rounded-full font-bold text-lg text-center ">
                            他のイベントに応募中のため<br class="sm:hidden">応募できません
                        </div>

                        <!-- 応募ボタン (まだ応募していない かつ 他のイベントにも応募していない場合に表示) -->
                        <form th:if="${(userEntry == null or userEntry.status != 'WAITING') and !hasActiveEntry}"
                              th:unless="${event.status != 'open'}"
                              method="post" th:action="@{/entries/create}"
                              class="w-full max-w-md">
                            <input type="hidden" name="eventId" th:value="${event.id}">
                            <button type="submit"
                                    class="w-full bg-blue-600 text-white px-8 py-4 rounded-full hover:bg-blue-700 hover:shadow-lg focus:ring-4 focus:ring-blue-200 transition duration-300 font-bold text-lg flex justify-center items-center group transform hover:-translate-y-0.5">
                                <span>このイベントに応募する</span>
                                <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none"
                                     stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                                </svg>
                            </button>
                        </form>
                    </div>

                    <!-- 受付終了時の表示 (未ログイン、ログイン済み共通) -->
                    <button th:if="${event.status != 'open'}"
                            disabled
                            class="w-full max-w-md bg-gray-100 text-gray-400 border border-gray-200 px-8 py-4 rounded-full cursor-not-allowed font-bold text-lg text-center shadow-inner">
                        応募は締め切られました
                    </button>

                    <a href="/"
                       class="text-gray-500 hover:text-gray-800 font-medium transition duration-300 border-b border-transparent hover:border-gray-800 pb-0.5">
                        一覧に戻る
                    </a>
                </div>

                <!--------------- 応募完了モーダル----------------->
                <div id="completion-modal"
                     class="fixed inset-0 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
                    <!-- 背景オーバーレイ -->
                    <div class="absolute inset-0 bg-black bg-opacity-50" onclick="closeModal()"></div>

                    <!-- モーダルコンテンツ -->
                    <div class="bg-white rounded-lg shadow-2xl p-8 max-w-sm w-full mx-4 relative transform scale-95 transition-transform duration-300">
                        <div class="text-center">
                            <!-- チェックマークアイコン -->
                            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
                                <svg class="h-10 w-10 text-green-600" fill="none" stroke="currentColor"
                                     viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>

                            <h3 class="text-xl font-bold text-gray-900 mb-4">応募が完了しました！</h3>
                            <p class="text-gray-500 mb-8">受付でチケットページを<br>係員へご提示ください。
                            </p>

                            <div class="flex flex-col gap-3">
                                <a th:if="${userEntry != null}" th:href="@{/ticket/{id}(id=${userEntry.id})}"
                                   class="w-full bg-blue-600 text-white px-4 py-3 rounded-lg font-bold hover:bg-blue-700 transition duration-200">
                                    チケットページへ
                                </a>
                                <button onclick="closeModal()"
                                        class="w-full bg-gray-200 text-gray-800 px-4 py-3 rounded-lg font-bold hover:bg-gray-300 transition duration-200">
                                    閉じる
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div layout:fragment="scripts">
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', () => {
            /*[[${showCompletionModal}]]*/
            const showModal = [[${showCompletionModal}]] || false;

            if (showModal) {
                openModal();
            }
        });

        function openModal() {
            const modal = document.getElementById('completion-modal');
            if (modal) {
                const modalContent = modal.querySelector('div.bg-white');
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                }, 10);
            }
        }

        function closeModal() {
            const modal = document.getElementById('completion-modal');
            if (modal) {
                const modalContent = modal.querySelector('div.bg-white');
                modal.classList.add('opacity-0');
                modalContent.classList.remove('scale-100');
                modalContent.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }
    </script>
</div>
</body>
</html>
