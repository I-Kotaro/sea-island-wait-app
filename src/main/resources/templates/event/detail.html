<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${event.name}">イベント詳細</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg overflow-hidden">

        <!-- メインビジュアル -->
        <img class="w-full h-64 object-cover" th:src="${event.imageUrl}" alt="Event Image">

        <div class="p-8">
            <!-- タイトル -->
            <h1 class="text-3xl font-bold text-gray-800 mb-4" th:text="${event.name}">イベント名</h1>

            <!-- 基本情報 -->
            <div class="flex flex-wrap gap-4 mb-6 text-sm text-gray-600">
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span th:text="${event.startTime} + ' - ' + ${event.endTime}">10:00 - 12:00</span>
                </div>
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    <span>定員: <span th:text="${event.capacity}">20</span>名</span>
                </div>
                <div class="flex items-center">
                    <span class="px-2 py-1 rounded text-xs font-semibold"
                          th:classappend="${event.status == 'open' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}"
                          th:text="${event.status == 'open' ? '募集中' : '受付終了'}">
                        ステータス
                    </span>
                </div>
            </div>

            <!-- 詳細説明 -->
            <div class="prose max-w-none mb-8">
                <h3 class="text-xl font-semibold text-gray-800 mb-2">イベント内容</h3>
                <p class="text-gray-700 whitespace-pre-wrap" th:text="${event.description}">
                    イベント説明
                </p>
            </div>

            <!-- アクションボタン -->
            <div class="flex justify-center gap-4">
                <a href="/"
                   class="bg-gray-500 text-white px-6 py-3 rounded-md hover:bg-gray-600 transition duration-300">
                    一覧に戻る
                </a>

                <!-- 応募ボタン (ステータスがopenの場合のみ表示) -->
                <form th:if="${event.status == 'open'}" method="post" th:action="@{/entries/create}">
                    <input type="hidden" name="eventId" th:value="${event.id}">
                    <!-- 仮のユーザーID (本来はログインユーザー) -->
                    <input type="hidden" name="userId" value="00000000-0000-0000-0000-000000000001">
                    <button type="submit"
                            class="bg-blue-600 text-white px-8 py-3 rounded-md hover:bg-blue-700 transition duration-300 font-bold shadow-md">
                        このイベントに応募する
                    </button>
                </form>

                <button th:unless="${event.status == 'open'}" disabled
                        class="bg-gray-300 text-gray-500 px-8 py-3 rounded-md cursor-not-allowed font-bold">
                    応募は締め切られました
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
