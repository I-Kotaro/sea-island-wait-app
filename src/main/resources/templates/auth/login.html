<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>ログイン</title>
</head>
<body>
<div layout:fragment="content" class="flex justify-center items-center min-h-[70vh] px-4 py-8 relative z-10">
    <div class="bg-white backdrop-blur-md p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white/20">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">ログイン</h2>
        <form th:action="@{/login}" method="post">
            <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                メールアドレスまたはパスワードが正しくありません。
            </div>
            <div th:if="${param.logout}"
                 class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
                ログアウトしました。
            </div>
            <div class="mb-4">
                <label for="email" class="block text-gray-700 font-bold mb-2">メールアドレス</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 font-bold mb-2">パスワード</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-600 transition duration-300">
                ログイン
            </button>
        </form>
        <div class="mt-4 text-center">
            <p class="text-gray-600">アカウントをお持ちでないですか？ <br class="block md:hidden">
                <a th:href="@{/register}" class="text-blue-500 hover:underline">新規登録</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
