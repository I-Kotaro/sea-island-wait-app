<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>新規登録</title>
</head>
<body>
<div layout:fragment="content" class="flex justify-center items-center min-h-[60vh]">
    <div class="bg-white p-8 mt-12 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">新規登録</h2>
        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="mb-4">
                <label for="name" class="block text-gray-700 font-bold mb-2">名前</label>
                <input type="text" id="name" th:field="*{name}" required
                       class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label for="email" class="block text-gray-700 font-bold mb-2">メールアドレス</label>
                <input type="email" id="email" th:field="*{email}" required
                       class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 font-bold mb-2">パスワード</label>
                <input type="password" id="password" th:field="*{password}" required
                       class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-600 transition duration-300">
                登録する
            </button>
        </form>
        <div class="mt-4 text-center">
            <p class="text-gray-600">すでにアカウントをお持ちですか？ <a th:href="@{/login}"
                                                                        class="text-blue-500 hover:underline">ログイン</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
